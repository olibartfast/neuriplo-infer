name: Release Guard

# Runs when a semver release tag is pushed. Verifies versions.env sibling pins
# at the tag so checkouts rebuild against fixed sibling code.
#
# GitHub Release publishing is handled separately by publish-github-release.yml
# (workflow_run after this workflow succeeds) so tags cut before the publish
# workflow existed still get a Release without retagging.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing semver tag to validate (e.g. v0.5.0)'
        required: true
        type: string

jobs:
  validate-sibling-pins:
    name: Validate sibling pins
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate versions.env pins and sibling tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          bash scripts/validate_release_pins.sh "${tag}"
