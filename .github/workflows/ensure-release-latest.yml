name: Ensure Release Latest

# One-shot repair: mark an existing GitHub Release as Latest (fixes /releases UI
# when a tag exists but v0.4.x still shows as the latest release).

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/ensure-release-latest.yml
  workflow_dispatch:
    inputs:
      tag:
        description: 'Semver tag to mark as Latest (e.g. v0.5.0)'
        required: true
        default: v0.5.0
        type: string

permissions:
  contents: write

jobs:
  ensure-latest:
    name: Mark release as Latest
    runs-on: ubuntu-24.04
    steps:
      - name: Ensure GitHub Release is Latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="v0.5.0"
          fi
          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag must match vX.Y.Z (got '${tag}')" >&2
            exit 1
          fi
          gh release view "${tag}"
          gh release edit "${tag}" --latest --title "${tag}"
          gh release view "${tag}" --json tagName,isLatest,url \
            --jq '"\(.tagName) isLatest=\(.isLatest) \(.url)"'
