name: Publish GitHub Release

# Creates the GitHub Release on /releases from CHANGELOG.md after Release Guard
# succeeds. Uses workflow_run so the publish steps come from the default branch
# workflow file even when the tag points at an older commit (e.g. v0.5.0).

on:
  workflow_run:
    workflows: ["Release Guard"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing semver tag to publish (e.g. v0.5.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish release notes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.event.workflow_run.head_branch }}"
          fi
          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag must match vX.Y.Z (got '${tag}')" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          notes_file="${RUNNER_TEMP}/release-notes.md"
          version="${{ steps.meta.outputs.version }}"
          awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]" { p=1; next }
            /^## \[/ { if (p) exit }
            p { print }
          ' CHANGELOG.md > "${notes_file}"
          if [ ! -s "${notes_file}" ]; then
            echo "Error: empty CHANGELOG section for [${version}]" >&2
            exit 1
          fi
          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Check whether GitHub Release already exists
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "skip_create=true" >> "${GITHUB_OUTPUT}"
            echo "Release ${{ steps.meta.outputs.tag }} already exists."
          else
            echo "skip_create=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish GitHub Release
        if: steps.existing.outputs.skip_create != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
          make_latest: true

      - name: Ensure release is marked Latest on GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          gh release edit "${tag}" --latest --title "${tag}"
          gh release view "${tag}" --json tagName,isLatest,url \
            --jq '"\(.tagName) isLatest=\(.isLatest) \(.url)"'
