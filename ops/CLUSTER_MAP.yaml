cluster:
  name: vision-stack
  integration_branch: develop
  release_branch: master
  source_of_truth:
    task_contracts: neuriplo-tasks
    backend_orchestration: neuriplo
    video_io: videocapture
    application_flow: neuriplo-infer
  local_checkout_hints:
    neuriplo-infer: .
    neuriplo-tasks: ../neuriplo-tasks
    neuriplo: ../neuriplo
    videocapture: ../videocapture

repos:
  neuriplo-tasks:
    repo_root: ../neuriplo-tasks
    role: task-contracts
    provides:
      - task_factory
      - task_interface
      - preprocessing
      - postprocessing
      - result_types
    consumed_by:
      - neuriplo-infer
      - tritonic
    automation_scope:
      - ci-triage
      - api-migration-source
      - test-fix
      - docs-sync

  neuriplo:
    repo_root: ../neuriplo
    role: backend-orchestrator
    provides:
      - backend_abstractions
      - backend_adapters
      - backend_version_management
      - runtime_selection
    consumed_by:
      - neuriplo-infer
    automation_scope:
      - ci-triage
      - dependency-sync
      - backend-config-fix
      - docs-sync

  videocapture:
    repo_root: ../videocapture
    role: video-io
    provides:
      - source_capture
      - stream_backends
      - file_backends
      - camera_backends
    consumed_by:
      - neuriplo-infer
    automation_scope:
      - ci-triage
      - dependency-sync
      - io-regression-fix
      - docs-sync

  neuriplo-infer:
    repo_root: .
    role: application
    depends_on:
      - neuriplo-tasks
      - neuriplo
      - videocapture
    provides:
      - cli
      - app_config
      - runtime_wiring
      - visualization
      - e2e_execution
    automation_scope:
      - ci-triage
      - downstream-api-migration
      - docs-sync
      - test-fix

dependency_edges:
  - from: neuriplo-infer
    to: neuriplo-tasks
    type: api
    critical_contracts:
      - task_factory model type strings
      - result variant semantics
      - tensor shape and dtype expectations
  - from: neuriplo-infer
    to: neuriplo
    type: runtime
    critical_contracts:
      - backend selection
      - device placement
      - dependency setup paths
  - from: neuriplo-infer
    to: videocapture
    type: io
    critical_contracts:
      - source semantics
      - backend priority
      - stream reliability
  - from: tritonic
    to: neuriplo-tasks
    type: api
    critical_contracts:
      - task_factory model type strings
      - result variant semantics
      - tensor shape and dtype expectations

validation_order:
  - repo_local
  - downstream_integration
  - performance_and_output_checks

agents:
  coordinator:
    responsibilities:
      - ingest_pr_ci_and_schedule_signals
      - classify_change_type
      - dispatch_repo_scoped_tasks
  repo_workers:
    - neuriplo-tasks-worker
    - neuriplo-worker
    - videocapture-worker
    - neuriplo-infer-worker
  verifier:
    responsibilities:
      - run_repo_local_checks
      - run_cross_repo_compatibility_checks
      - summarize_evidence
  release_safety:
    responsibilities:
      - enforce_branch_policies
      - ensure_release_only_changes_target_master
      - reject_unsafe_packaging_or_version_drift
